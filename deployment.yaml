apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-api
  labels:
    app: task-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-api
  template:
    metadata:
      labels:
        app: task-api
    spec:
      containers:
        - name: task-api
          image: <registry>/test-applications-dotnet:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_PORT
              value: "5000"
            - name: APP_LOG_PATH
              value: /app/logs
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          readinessProbe:
            httpGet:
              path: /api/tasks
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tasks
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: task-api
  labels:
    app: task-api
spec:
  selector:
    app: task-api
  ports:
    - name: http
      port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-api-caller
  labels:
    app: task-api-caller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-api-caller
  template:
    metadata:
      labels:
        app: task-api-caller
    spec:
      containers:
        - name: task-api-caller
          image: 684398786625.dkr.ecr.us-east-1.amazonaws.com/franzplatzer/test-applications-dotnet-caller:latest
          imagePullPolicy: Always
          env:
            - name: BASE_URL
              value: http://task-api
---
apiVersion: v1
kind: Service
metadata:
  name: task-api-caller
  labels:
    app: task-api-caller
spec:
  selector:
    app: task-api-caller
  ports:
    - name: http
      port: 80
  type: ClusterIP
